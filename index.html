<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gravel Coach">
<title>Gravel Coach - Entrenamiento de Ciclismo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,Helvetica,sans-serif;background:#111;color:#fff;overflow:hidden;position:fixed;inset:0}
#app{height:100%;display:flex;flex-direction:column}
.scroll{-webkit-overflow-scrolling:touch;overflow-y:auto;flex:1;padding:16px}
.card{background:#1C1C1E;border-radius:20px;padding:20px;margin-bottom:16px}
.card-orange{background:#2A1208;border:1px solid rgba(232,71,10,0.3);border-radius:20px;padding:20px;margin-bottom:16px}
.text-primary{color:#E8470A}
.text-muted{color:#8E8E93}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.flex-around{display:flex;justify-content:space-around}
.stat-value{font-size:28px;font-weight:800}
.bottom-nav{display:flex;padding:12px 0 20px;border-top:1px solid rgba(255,255,255,0.08);background:#111}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;background:none;border:none;font-size:11px;font-weight:500;color:#8E8E93}
.send-btn{width:100%;padding:16px;border-radius:14px;background:#E8470A;color:#fff;font-size:16px;font-weight:700;margin-top:20px;border:none}
.btn-secondary{background:rgba(232,71,10,0.15);color:#E8470A;border:1px solid rgba(232,71,10,0.3)}
.step-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.08)}
.step-item:last-child{border-bottom:none}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:1000;display:flex;flex-direction:column}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid rgba(255,255,255,0.08)}
.modal-content{flex:1;overflow-y:auto;padding:16px}
.input{background:#2A2A2C;border:none;border-radius:12px;padding:12px 16px;color:#fff;font-size:16px;width:100%;margin-bottom:12px}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
// ========== CONFIG INTERVALS.ICU ==========
const ATH_ID = 'i337330';
const API_KEY = '3fowthtiztbr4qchhzsy34j54';
const AUTH = 'Basic ' + btoa('API_KEY:' + API_KEY);
const TODAY = new Date();
const TODAY_S = TODAY.toISOString().split('T')[0];

// ========== DATOS INICIALES ==========
const RACES_INIT = [
  {id:1, name:'🏆 Mundial Gravel', date:'2026-10-10', cat:'A'},
  {id:2, name:'🇪🇺 Europeo Gravel', date:'2026-08-30', cat:'A'},
  {id:3, name:'🇪🇸 Campeonato Madrid', date:'2026-05-09', cat:'B'}
];

const PLAN_INIT = [
  {id:1, day:'MIÉ', name:'⚡ VO2max Corto', desc:'6x4 min al 115% FTP', dur:'1h 15min', tss:95, today:true,
   steps:[{name:'🔥 Calentamiento', mins:15, pct:[0.60,0.65]},{name:'⚡ VO2max x6', mins:24, pct:[1.10,1.15]},{name:'❄️ Enfriamiento', mins:10, pct:[0.48,0.52]}]},
  {id:2, day:'JUE', name:'🚴 Z2 + Eficiencia', desc:'90 min Z2 (~65% FTP)', dur:'1h 30min', tss:70, today:false,
   steps:[{name:'🔥 Calentamiento', mins:10, pct:[0.58,0.63]},{name:'🚴 Z2 Base', mins:70, pct:[0.63,0.68]},{name:'❄️ Enfriamiento', mins:10, pct:[0.48,0.52]}]},
  {id:3, day:'VIE', name:'🔄 Repeatability', desc:'5x15 min Z3 (~82% FTP)', dur:'2h', tss:110, today:false,
   steps:[{name:'🔥 Calentamiento', mins:15, pct:[0.60,0.65]},{name:'🔄 Bloques x5', mins:75, pct:[0.80,0.85]},{name:'❄️ Enfriamiento', mins:15, pct:[0.48,0.52]}]},
  {id:4, day:'SÁB', name:'🏔️ Simulación Gravel', desc:'4h terreno mixto', dur:'4h', tss:200, today:false,
   steps:[{name:'🔥 Rodaje base', mins:60, pct:[0.63,0.70]},{name:'⚡ Fartlek', mins:120, pct:[0.75,0.95]},{name:'❄️ Vuelta calma', mins:60, pct:[0.50,0.58]}]},
  {id:5, day:'DOM', name:'😴 Descanso Activo', desc:'45 min Z1 recuperación', dur:'45min', tss:30, today:false,
   steps:[{name:'🚴 Z1', mins:45, pct:[0.50,0.56]}]}
];

// ========== HELPERS ==========
function daysUntil(date){
  let target = new Date(date + 'T00:00:00');
  let today = new Date();
  today.setHours(0,0,0,0);
  target.setHours(0,0,0,0);
  return Math.round((target - today) / 86400000);
}

// ========== ESTADO ==========
let state = {
  tab: 'inicio',
  plan: JSON.parse(JSON.stringify(PLAN_INIT)),
  races: JSON.parse(JSON.stringify(RACES_INIT)),
  ftp: 290,
  peso: 63,
  wellness: {ctl:85, atl:92, form:-7},
  syncStatus: 'offline',
  modal: null,
  customWorkout: {name:'Mi Entreno', steps:[{name:'Calentamiento', mins:15, pct:[0.60,0.65]},{name:'Intervalos', mins:30, pct:[1.00,1.05]},{name:'Enfriamiento', mins:10, pct:[0.48,0.52]}]}
};

// ========== FUNCIONES API ==========
function sendToIntervals(workout){
  return new Promise(async (resolve) => {
    try {
      let proxy = 'https://cors-anywhere.herokuapp.com/';
      let response = await fetch(proxy + 'https://intervals.icu/api/v1/athlete/' + ATH_ID + '/events', {
        method: 'POST',
        headers: {'Authorization': AUTH, 'Content-Type': 'application/json'},
        body: JSON.stringify({
          category: 'WORKOUT',
          start_date_local: TODAY_S + 'T08:00:00',
          name: workout.name,
          description: workout.desc || '',
          type: 'Ride',
          workout_doc: {
            type: 'bike',
            name: workout.name,
            steps: (workout.steps || []).map((s,i) => ({
              type: 'STEADY_STATE',
              name: s.name,
              order: i+1,
              duration: (s.mins || 15) * 60,
              targets: [{type: 'POWER', min: Math.round((s.pct?.[0] || 0.6) * 100), max: Math.round((s.pct?.[1] || 0.7) * 100)}]
            }))
          }
        })
      });
      if(response.ok){ alert('✅ Workout enviado a Intervals.icu'); resolve(true); }
      else resolve(false);
    } catch(e){ alert('📱 Modo offline - Workout guardado localmente'); resolve(true); }
  });
}

function loadIntervalsData(){
  fetch('https://cors-anywhere.herokuapp.com/https://intervals.icu/api/v1/athlete/' + ATH_ID, {headers:{'Authorization':AUTH}})
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if(data){
        if(data.ftp) state.ftp = data.ftp;
        if(data.weight) state.peso = data.weight;
        state.syncStatus = 'connected';
        render();
      }
    })
    .catch(() => { state.syncStatus = 'offline'; render(); });
}

// ========== RENDER PRINCIPAL ==========
let root = document.getElementById('app');

function render(){
  let todayWo = state.plan.find(p => p.today) || state.plan[0];
  let nextRace = state.races.filter(r => daysUntil(r.date) >= 0).sort((a,b) => new Date(a.date) - new Date(b.date))[0];
  let isOnline = state.syncStatus === 'connected';
  let html = '';

  // Pantalla Inicio
  if(state.tab === 'inicio'){
    html = `
      <div class="scroll">
        <div class="flex-between" style="margin-bottom:20px">
          <div><div class="text-muted" style="font-size:14px">Buenos días,</div><div style="font-size:28px;font-weight:800">Alex</div></div>
          <div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:4px;background:${isOnline ? '#30D158' : '#FF9F0A'}"></div><div class="text-muted" style="font-size:11px">${isOnline ? 'Online' : 'Offline'}</div></div>
        </div>
        <div class="card-orange" onclick="setTab('hoy')">
          <div class="text-primary" style="font-size:12px;font-weight:700;margin-bottom:8px">🔥 ENTRENO DE HOY</div>
          <div style="font-size:22px;font-weight:800">${todayWo.name}</div>
          <div class="text-muted" style="margin-top:6px">${todayWo.desc}</div>
          <div class="flex-between" style="margin-top:16px"><div class="text-primary" style="font-size:16px;font-weight:700">${todayWo.dur}</div><div class="text-muted">${todayWo.tss} TSS</div></div>
        </div>
        <div class="card">
          <div class="text-muted" style="font-size:12px;font-weight:700;margin-bottom:12px">🏆 PRÓXIMA CARRERA</div>
          <div style="font-size:18px;font-weight:700">${nextRace?.name || ''}</div>
          <div class="text-muted" style="margin-top:4px">${nextRace?.date || ''} · ${nextRace ? daysUntil(nextRace.date) : 0} días</div>
          <div style="margin-top:12px"><div style="height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden"><div style="width:${Math.min(100, Math.max(0, 100 - (nextRace ? daysUntil(nextRace.date) : 0) * 0.8))}%;height:100%;background:#E8470A;border-radius:4px"></div></div></div>
        </div>
        <div class="card">
          <div class="text-muted" style="font-size:12px;font-weight:700;margin-bottom:16px">📊 ESTADO DE FORMA</div>
          <div class="flex-around">
            <div style="text-align:center"><div class="stat-value" style="color:#30D158">${Math.round(state.wellness.ctl)}</div><div class="text-muted" style="font-size:12px;margin-top:4px">FITNESS</div></div>
            <div style="text-align:center"><div class="stat-value" style="color:#FF9F0A">${Math.round(state.wellness.atl)}</div><div class="text-muted" style="font-size:12px;margin-top:4px">FATIGA</div></div>
            <div style="text-align:center"><div class="stat-value" style="color:${state.wellness.form > 5 ? '#30D158' : state.wellness.form < -15 ? '#FF3B30' : '#FF9F0A'}">${state.wellness.form > 0 ? '+' : ''}${Math.round(state.wellness.form)}</div><div class="text-muted" style="font-size:12px;margin-top:4px">FORMA</div></div>
            <div style="text-align:center"><div class="stat-value">${state.ftp}</div><div class="text-muted" style="font-size:12px;margin-top:4px">FTP</div></div>
          </div>
        </div>
      </div>
    `;
  }
  // Pantalla Hoy
  else if(state.tab === 'hoy'){
    let stepsHtml = '';
    for(let i = 0; i < todayWo.steps.length; i++){
      let s = todayWo.steps[i];
      let lo = Math.round(s.pct[0] * state.ftp);
      let hi = Math.round(s.pct[1] * state.ftp);
      stepsHtml += `
        <div class="step-item">
          <div style="font-size:24px">${i === 0 ? '🔥' : i === todayWo.steps.length-1 ? '❄️' : '⚡'}</div>
          <div style="flex:1"><div style="font-size:16px;font-weight:600">${s.name}</div><div class="text-muted" style="font-size:13px;margin-top:2px">${s.mins} min · ${lo}-${hi} W (${Math.round(s.pct[0]*100)}-${Math.round(s.pct[1]*100)}% FTP)</div></div>
        </div>
      `;
    }
    html = `
      <div class="scroll">
        <div class="card-orange">
          <div class="text-primary" style="font-size:12px;font-weight:700;margin-bottom:8px">🔥 ENTRENO DE HOY</div>
          <div style="font-size:24px;font-weight:800">${todayWo.name}</div>
          <div class="text-muted" style="margin-top:6px">${todayWo.desc}</div>
          <div class="flex-between" style="margin-top:16px"><div class="text-primary" style="font-size:16px;font-weight:700">${todayWo.dur}</div><div class="text-muted">${todayWo.tss} TSS</div></div>
        </div>
        <div class="card">
          <div style="font-size:14px;font-weight:700;margin-bottom:16px">📋 SERIES DEL ENTRENO</div>
          ${stepsHtml}
          <button class="send-btn" id="sendWorkoutBtn">⚡ Enviar a Intervals.icu</button>
        </div>
      </div>
    `;
  }
  // Pantalla Plan
  else if(state.tab === 'plan'){
    let items = '';
    for(let w of state.plan){
      items += `
        <div style="margin-bottom:12px" onclick="setWorkoutAndGo(${w.id})">
          <div style="background:${w.today ? '#2A1208' : '#1C1C1E'};border-radius:16px;padding:16px;border:${w.today ? '1px solid rgba(232,71,10,0.3)' : 'none'}">
            <div class="flex-between">
              <div style="flex:1"><div class="text-muted" style="font-size:14px;font-weight:700">${w.day}</div><div style="font-size:16px;font-weight:600">${w.name}</div><div class="text-muted" style="font-size:12px;margin-top:2px">${w.desc}</div></div>
              ${w.dur ? `<div class="text-primary" style="font-size:15px;font-weight:700">${w.dur}</div>` : ''}
            </div>
          </div>
        </div>
      `;
    }
    html = `<div class="scroll"><div style="font-size:24px;font-weight:800;margin-bottom:20px">📅 Plan Semanal</div>${items}</div>`;
  }
  // Pantalla Más
  else if(state.tab === 'mas'){
    html = `
      <div class="scroll">
        <div class="card">
          <div style="font-size:18px;font-weight:700;margin-bottom:16px">📊 Mis Datos</div>
          <div class="flex-between" style="margin-bottom:12px"><div class="text-muted">FTP</div><div style="font-weight:600">${state.ftp} W</div></div>
          <div class="flex-between" style="margin-bottom:12px"><div class="text-muted">Peso</div><div style="font-weight:600">${state.peso} kg</div></div>
          <div class="flex-between"><div class="text-muted">W/kg</div><div style="font-weight:600">${(state.ftp/state.peso).toFixed(1)}</div></div>
        </div>
        <button class="send-btn btn-secondary" id="openCreatorBtn" style="margin-bottom:12px">⚙️ Crear Series Personalizadas</button>
        <button class="send-btn btn-secondary" id="openEventsBtn" style="margin-bottom:12px">🏆 Gestionar Eventos</button>
        <button class="send-btn btn-secondary" id="syncBtn">🔄 Sincronizar con Intervals.icu</button>
      </div>
    `;
  }

  let bottomNav = `
    <div class="bottom-nav">
      <button class="tab-btn" onclick="setTab('inicio')"><div style="font-size:24px;margin-bottom:4px;opacity:${state.tab === 'inicio' ? 1 : 0.5}">🏠</div><div style="color:${state.tab === 'inicio' ? '#E8470A' : '#8E8E93'}">INICIO</div></button>
      <button class="tab-btn" onclick="setTab('hoy')"><div style="font-size:24px;margin-bottom:4px;opacity:${state.tab === 'hoy' ? 1 : 0.5}">🔥</div><div style="color:${state.tab === 'hoy' ? '#E8470A' : '#8E8E93'}">HOY</div></button>
      <button class="tab-btn" onclick="setTab('plan')"><div style="font-size:24px;margin-bottom:4px;opacity:${state.tab === 'plan' ? 1 : 0.5}">📅</div><div style="color:${state.tab === 'plan' ? '#E8470A' : '#8E8E93'}">PLAN</div></button>
      <button class="tab-btn" onclick="setTab('mas')"><div style="font-size:24px;margin-bottom:4px;opacity:${state.tab === 'mas' ? 1 : 0.5}">☰</div><div style="color:${state.tab === 'mas' ? '#E8470A' : '#8E8E93'}">MÁS</div></button>
    </div>
  `;

  root.innerHTML = `<div style="height:100%;display:flex;flex-direction:column">${html}${bottomNav}</div>`;

  // Eventos de botones
  let sendBtn = document.getElementById('sendWorkoutBtn');
  if(sendBtn){
    sendBtn.onclick = async () => {
      let wo = state.plan.find(p => p.today) || state.plan[0];
      sendBtn.disabled = true;
      sendBtn.innerText = 'Enviando...';
      await sendToIntervals(wo);
      sendBtn.innerText = '✓ Enviado';
      setTimeout(() => { if(sendBtn) sendBtn.innerText = '⚡ Enviar a Intervals.icu'; }, 2000);
    };
  }

  let syncBtn = document.getElementById('syncBtn');
  if(syncBtn) syncBtn.onclick = () => { loadIntervalsData(); };

  let openCreatorBtn = document.getElementById('openCreatorBtn');
  if(openCreatorBtn) openCreatorBtn.onclick = () => { openWorkoutCreator(); };

  let openEventsBtn = document.getElementById('openEventsBtn');
  if(openEventsBtn) openEventsBtn.onclick = () => { openEventManager(); };
}

// ========== FUNCIONES GLOBALES ==========
window.setTab = function(tab){ state.tab = tab; render(); };

window.setWorkoutAndGo = function(id){
  let wo = state.plan.find(w => w.id === id);
  if(wo) { state.tab = 'hoy'; render(); }
};

function openWorkoutCreator(){
  let stepsHtml = '';
  for(let i = 0; i < state.customWorkout.steps.length; i++){
    let s = state.customWorkout.steps[i];
    stepsHtml += `
      <div style="margin-bottom:12px">
        <input class="input" placeholder="Nombre" value="${s.name}" onchange="updateStep(${i}, 'name', this.value)">
        <div class="flex-between" style="gap:12px">
          <input type="number" class="input" placeholder="Minutos" value="${s.mins}" onchange="updateStep(${i}, 'mins', parseInt(this.value))" style="flex:1">
          <input type="number" class="input" placeholder="% min" value="${s.pct[0]*100}" onchange="updateStep(${i}, 'pct0', parseInt(this.value)/100)" style="flex:1">
          <input type="number" class="input" placeholder="% max" value="${s.pct[1]*100}" onchange="updateStep(${i}, 'pct1', parseInt(this.value)/100)" style="flex:1">
          <button onclick="removeStep(${i})" style="background:#FF3B30;border:none;border-radius:12px;padding:12px;color:#fff">🗑️</button>
        </div>
      </div>
    `;
  }
  let modalHtml = `
    <div class="modal" id="creatorModal">
      <div class="modal-header">
        <div style="font-size:18px;font-weight:700">⚙️ Crear Series</div>
        <button onclick="closeModal()" style="background:none;border:none;color:#fff;font-size:24px">✕</button>
      </div>
      <div class="modal-content">
        <input class="input" placeholder="Nombre del entrenamiento" value="${state.customWorkout.name}" onchange="updateWorkoutName(this.value)">
        ${stepsHtml}
        <button class="send-btn" onclick="addStep()" style="margin-bottom:12px;background:#2A2A2C">+ Añadir Bloque</button>
        <button class="send-btn" id="saveWorkoutBtn">💾 Guardar y Enviar a Intervals</button>
      </div>
    </div>
  `;
  document.body.insertAdjacentHTML('beforeend', modalHtml);
  let saveBtn = document.getElementById('saveWorkoutBtn');
  if(saveBtn) saveBtn.onclick = async () => {
    await sendToIntervals(state.customWorkout);
    closeModal();
    alert('✅ Workout enviado');
  };
}

window.updateStep = function(idx, field, val){
  if(field === 'name') state.customWorkout.steps[idx].name = val;
  else if(field === 'mins') state.customWorkout.steps[idx].mins = val;
  else if(field === 'pct0') state.customWorkout.steps[idx].pct[0] = val;
  else if(field === 'pct1') state.customWorkout.steps[idx].pct[1] = val;
};

window.updateWorkoutName = function(name){ state.customWorkout.name = name; };

window.addStep = function(){
  state.customWorkout.steps.push({name:'Nuevo bloque', mins:10, pct:[0.75,0.80]});
  closeModal();
  openWorkoutCreator();
};

window.removeStep = function(idx){
  state.customWorkout.steps.splice(idx,1);
  closeModal();
  openWorkoutCreator();
};

function openEventManager(){
  let eventsHtml = '';
  for(let r of state.races){
    eventsHtml += `
      <div class="card" style="margin-bottom:12px">
        <div class="flex-between">
          <div><div style="font-weight:700">${r.name}</div><div class="text-muted" style="font-size:12px">${r.date} · ${daysUntil(r.date)} días</div></div>
          <button onclick="deleteEvent(${r.id})" style="background:#FF3B30;border:none;border-radius:12px;padding:8px 16px;color:#fff">Borrar</button>
        </div>
      </div>
    `;
  }
  let modalHtml = `
    <div class="modal" id="eventsModal">
      <div class="modal-header">
        <div style="font-size:18px;font-weight:700">🏆 Eventos</div>
        <button onclick="closeModal()" style="background:none;border:none;color:#fff;font-size:24px">✕</button>
      </div>
      <div class="modal-content">
        ${eventsHtml}
        <div style="margin-top:16px">
          <input class="input" id="eventName" placeholder="Nombre del evento">
          <input class="input" id="eventDate" placeholder="Fecha (YYYY-MM-DD)">
          <button class="send-btn" onclick="addEvent()">+ Añadir Evento</button>
        </div>
      </div>
    </div>
  `;
  document.body.insertAdjacentHTML('beforeend', modalHtml);
}

window.addEvent = function(){
  let name = document.getElementById('eventName')?.value;
  let date = document.getElementById('eventDate')?.value;
  if(name && date){
    state.races.push({id: Date.now(), name: name, date: date, cat:'C'});
    closeModal();
    openEventManager();
    render();
  } else { alert('Completa nombre y fecha'); }
};

window.deleteEvent = function(id){
  state.races = state.races.filter(r => r.id !== id);
  closeModal();
  openEventManager();
  render();
};

window.closeModal = function(){
  let modal = document.getElementById('creatorModal') || document.getElementById('eventsModal');
  if(modal) modal.remove();
};

loadIntervalsData();
})();
</script>
</body>
</html>
