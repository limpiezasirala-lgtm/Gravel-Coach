<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gravel Coach</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

.card-orange{background:#2A1208;border:1px solid #E8470A;border-radius:20px;padding:20px;margin-bottom:16px}
.text-primary{color:#E8470A}
.text-muted{color:#8E8E93}
.flex-between{display:flex;justify-content:space-between}
</style>
</head>
<body>
<div class="card-orange">
<div class="text-primary">🔥 HOY</div>
<div style="font-size:20px;font-weight:800">VO2max Corto</div>
<div class="text-muted">6x4 min al 115% FTP</div>
<div class="flex-between" style="margin-top:12px">
<span class="text-primary">1h 15min</span>
<span>95 TSS</span>
</div>
</div>
<div class="card">
<div class="text-muted">🏆 PRÓXIMA CARRERA</div>
<div style="font-size:18px;font-weight:700">Mundial Gravel</div>
<div class="text-muted">10 de octubre de 2026 · 167 días</div>
</div>
<div class="card">
<div class="text-muted">📊 ESTADO DE FORMA</div>
<div class="flex-between" style="margin-top:12px">
<div><span style="color:#30D158;font-size:24px;font-weight:800">85</span><br>FITNESS</div>
<div><span style="color:#FF9F0A;font-size:24px;font-weight:800">92</span><br>FATIGA</div>
<div><span style="color:#FF9F0A;font-size:24px;font-weight:800">-7</span><br>FORMA</div>
<div><span style="font-size:24px;font-weight:800">290</span><br>FTP</div>
</div>
</div>
</body>
</html>
